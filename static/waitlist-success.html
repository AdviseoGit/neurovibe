<!DOCTYPE html>
<html lang="sv" class="bg-[#050505]">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Du är registrerad | Neurovibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .glass-panel { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px; }
    </style>
</head>
<body class="text-[#E0E0E0] min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Background element -->
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[80vw] h-[80vw] max-w-[600px] max-h-[600px] bg-gradient-to-tr from-[#D83131]/20 to-transparent rounded-full blur-[100px] opacity-50 z-[-1]"></div>

    <div class="glass-panel w-full max-w-lg p-12 text-center animate-[fadeIn_0.5s_ease-out]">
        <div class="w-20 h-20 bg-green-500/10 text-green-500 rounded-full flex items-center justify-center mx-auto mb-8 border border-green-500/20">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 6L9 17l-5-5"/>
            </svg>
        </div>
        
        <h1 class="text-4xl font-bold text-white mb-4 tracking-tight">Välkommen.</h1>
        <p class="text-xl text-[#A0A0A0] font-light leading-relaxed mb-10">
            Din plats är säkrad. Vi meddelar dig så snart vi öppnar upp för nya användare i den inloggade plattformen.
        </p>

        <a href="/" class="inline-flex items-center justify-center bg-[#D83131] hover:bg-[#B72A2A] text-white px-8 py-4 rounded-xl font-semibold transition-all shadow-lg shadow-[#D83131]/20">
            Gå tillbaka till startsidan
        </a>
    </div>
</body>
</html>
