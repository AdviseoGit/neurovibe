<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurovibe - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-indigo-900 text-white p-4 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="font-bold text-xl tracking-tight">Neurovibe Admin</div>
            <button onclick="logout()" class="text-sm bg-indigo-800 hover:bg-indigo-700 px-4 py-2 rounded">Logga ut</button>
        </div>
    </nav>

    <!-- Login Overlay -->
    <div id="loginOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-95 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-xl shadow-2xl max-w-sm w-full">
            <h2 class="text-2xl font-bold mb-6 text-gray-800">Admin Login</h2>
            <input type="password" id="adminKey" placeholder="API Key" class="w-full p-3 border border-gray-300 rounded mb-4 focus:ring-2 focus:ring-indigo-500 outline-none">
            <button onclick="login()" class="w-full bg-indigo-600 text-white font-bold p-3 rounded hover:bg-indigo-700">Lås upp</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto p-6 mt-6">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="text-gray-500 text-sm font-medium mb-1">Totalt antal feedback</div>
                <div class="text-3xl font-bold text-gray-800" id="statTotal">-</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="text-gray-500 text-sm font-medium mb-1">Snittbetyg</div>
                <div class="text-3xl font-bold text-indigo-600" id="statAvg">-</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
                <div class="text-gray-500 text-sm font-medium mb-1">Populäraste verktyg</div>
                <div class="text-3xl font-bold text-gray-800" id="statTopTool">-</div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                <h2 class="text-xl font-bold text-gray-800">Senaste Feedback</h2>
                <button onclick="fetchData()" class="text-indigo-600 hover:text-indigo-800 text-sm font-medium flex items-center gap-1">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Uppdatera
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 text-gray-600 text-sm border-b border-gray-200">
                            <th class="p-4 font-medium">Datum</th>
                            <th class="p-4 font-medium">Verktyg</th>
                            <th class="p-4 font-medium">Betyg</th>
                            <th class="p-4 font-medium w-1/2">Kommentar</th>
                        </tr>
                    </thead>
                    <tbody id="feedbackTableBody" class="divide-y divide-gray-100">
                        <!-- Populated by JS -->
                        <tr><td colspan="4" class="p-8 text-center text-gray-400">Väntar på data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('neurovibe_admin_key');
        
        if (apiKey) {
            document.getElementById('loginOverlay').style.display = 'none';
            fetchData();
        }

        function login() {
            const key = document.getElementById('adminKey').value;
            if (key) {
                apiKey = key;
                localStorage.setItem('neurovibe_admin_key', key);
                document.getElementById('loginOverlay').style.display = 'none';
                fetchData();
            }
        }

        function logout() {
            localStorage.removeItem('neurovibe_admin_key');
            apiKey = null;
            document.getElementById('loginOverlay').style.display = 'flex';
            document.getElementById('adminKey').value = '';
        }

        async function fetchData() {
            try {
                const response = await fetch('/api/admin/feedback', {
                    headers: { 'X-API-KEY': apiKey }
                });

                if (response.status === 403 || response.status === 401) {
                    alert('Ogiltig API-nyckel');
                    logout();
                    return;
                }

                const data = await response.json();
                renderData(data);
            } catch (error) {
                console.error("Error fetching data", error);
            }
        }

        function renderData(data) {
            const tbody = document.getElementById('feedbackTableBody');
            
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="p-8 text-center text-gray-500">Ingen feedback insamlad ännu.</td></tr>';
                return;
            }

            // Calculate stats
            document.getElementById('statTotal').textContent = data.length;
            
            const avg = data.reduce((acc, curr) => acc + curr.rating, 0) / data.length;
            document.getElementById('statAvg').textContent = avg.toFixed(1) + ' / 5';

            const toolsCount = {};
            data.forEach(item => {
                toolsCount[item.tool] = (toolsCount[item.tool] || 0) + 1;
            });
            const topTool = Object.keys(toolsCount).reduce((a, b) => toolsCount[a] > toolsCount[b] ? a : b);
            
            const toolNames = {
                'nedbrytaren': 'Uppgiftsnedbrytaren',
                'fokustimer': 'Fokus Timer',
                'burnout': 'Burnout Calc',
                'mallar': 'Arbetsplatsmallar'
            };
            document.getElementById('statTopTool').textContent = toolNames[topTool] || topTool;

            // Render table
            tbody.innerHTML = '';
            data.forEach(item => {
                const date = new Date(item.created_at).toLocaleDateString('sv-SE', { year: 'numeric', month: 'short', day: 'numeric' });
                
                // Stars HTML
                let stars = '';
                for(let i=0; i<5; i++) {
                    stars += i < item.rating 
                        ? '<span class="text-yellow-400">★</span>' 
                        : '<span class="text-gray-300">★</span>';
                }

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 text-sm text-gray-500 whitespace-nowrap">${date}</td>
                        <td class="p-4 text-sm font-medium text-gray-800">${toolNames[item.tool] || item.tool}</td>
                        <td class="p-4 text-sm tracking-widest">${stars}</td>
                        <td class="p-4 text-sm text-gray-600 italic">"${item.comment || '-'}"</td>
                    </tr>
                `;
            });
        }
    </script>
</body>
</html>
